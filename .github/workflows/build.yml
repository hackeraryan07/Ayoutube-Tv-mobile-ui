name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 ───────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Download gradle-wrapper.jar (not committed to repo) ─────────
      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -sSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      # ── 4. Build Debug APK ─────────────────────────────────────────────
      - name: Build Debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 || {
            echo "=== BUILD FAILED — full log ==="
            ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1
            exit 1
          }

      # ── 5. Locate APK (helps debug path issues) ────────────────────────
      - name: Find APK path
        run: find . -name "*.apk" -type f

      # ── 6. Upload APK artifact ─────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AYouTube-Mobile-debug
          path: "**/outputs/apk/debug/*.apk"
          retention-days: 30
          if-no-files-found: error
