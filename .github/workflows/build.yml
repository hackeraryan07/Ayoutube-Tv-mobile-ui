name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:          # allows manual trigger from Actions tab

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 ───────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle          # caches ~/.gradle — speeds up subsequent runs

      # ── 3. Setup Gradle 8.2 ────────────────────────────────────────────
      - name: Setup Gradle 8.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      # ── 4. Generate Gradle Wrapper ─────────────────────────────────────
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2 --distribution-type all

      # ── 5. Build Debug APK ─────────────────────────────────────────────
      - name: Build Debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 6. Upload APK artifact ─────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AYouTube-Mobile-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error
